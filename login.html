<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | TechSource Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/auth.js"></script>
</head>
<body>
  <div class="bg-illustration"></div>

  <header class="topbar">
    <div class="logo">
      <img src="assets/logo.png" alt="TechSource Solutions" />
    </div>

    <nav class="nav">
      <a href="catalogo.html" class="nav-link">Catálogo</a>
      <a href="nueva-cotizacion.html" class="nav-link">+ Nueva cotización</a>
      <a href="historial-cotizaciones.html" class="nav-link">Historial Cotizaciones</a>
      <a href="login.html" class="nav-link active">Iniciar Sesión</a>
    </nav>

    <div class="topbar-right">
      <div class="sync-pill">
        <span class="sync-icon">◔</span>
        <span>Acceso administrativo</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card login-card">
      <h1 class="page-title">Iniciar Sesión</h1>
      <p class="page-subtitle">Ingresa tus credenciales para acceder al panel administrativo.</p>

      <div class="login-form">
        <div>
          <label class="label-form" for="usuario-admin">Usuario</label>
          <input id="usuario-admin" class="input-filtro" placeholder="Usuario" />
        </div>

        <div>
          <label class="label-form" for="password-admin">Contraseña</label>
          <input id="password-admin" type="password" class="input-filtro" placeholder="Contraseña" />
        </div>

        <button id="btn-login-admin" class="btn-primary btn-topbar">Ingresar</button>

        <p id="login-error" class="login-error" style="display:none;">
          Usuario o contraseña incorrectos.
        </p>
      </div>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
