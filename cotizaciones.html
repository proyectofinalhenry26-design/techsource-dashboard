<nav class="nav">

      <h1 class="page-title">Cotizaciones Emitidas</h1>

    <section class="card filters-card">
      <div class="filtros-grid filtros-cotizaciones">
        <input
          type="text"
          id="buscar-cotizacion"

          placeholder="Buscar por cliente o ID..."

          <option value="">Todos</option>
          <option value="vigentes">Precios vigentes</option>
          <option value="verificacion">Requiere verificación</option>
        </select>

        <input type="date" id="filtro-desde" class="input-filtro" />
        <input type="date" id="filtro-hasta" class="input-filtro" />
      </div>
    </section>

    <section class="card">
      <h2 class="section-title" id="cotizaciones-count">0 cotización(es) encontrada(s)</h2>
