<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial de cotizaciones | TechSource Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="bg-illustration"></div>

  <header class="topbar">
    <div class="logo">
      <img src="assets/logo.png" alt="TechSource Solutions" />
    </div>

    <nav class="nav">
      <a href="catalogo.html" class="nav-link">Catálogo</a>
      <a href="nueva-cotizacion.html" class="nav-link">+ Nueva cotización</a>
      <a href="historial-cotizaciones.html" class="nav-link active">Historial Cotizaciones</a>
      <a href="login.html" class="nav-link">Iniciar Sesión</a>
    </nav>

    <div class="topbar-right">
      <div class="sync-pill">
        <span class="sync-icon">◔</span>
        <span id="ultima-sync">Última sync: --</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1 class="page-title">Historial de Cotizaciones</h1>
      <p class="page-subtitle">Ingresa tu correo para consultar las cotizaciones generadas a tu nombre.</p>
    </section>

    <section class="card" style="margin-top:14px;">
      <div class="filtros-grid" style="grid-template-columns:1fr auto;">
        <input
          id="email-historial"
          class="input-filtro"
          type="email"
          placeholder="Ingresa tu email"
        />
        <button id="btn-buscar-historial" class="btn-primary btn-topbar">Buscar</button>
      </div>
    </section>

    <section class="card" id="resultado-historial-card" style="margin-top:14px;">
      <h2 class="section-title">Resultado</h2>
      <div id="resultado-historial">
        <p style="color:#6b7c98;">Aún no se ha realizado una búsqueda.</p>
      </div>
    </section>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/historial-cotizaciones.js"></script>
</body>
</html>
