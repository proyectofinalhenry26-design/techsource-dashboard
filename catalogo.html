<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo | TechSource Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="bg-illustration"></div>

<header class="topbar">
  <div class="logo">
    <img src="assets/logo.png" alt="TechSource Solutions" />
  </div>

<nav class="nav">
  <a href="index.html" class="nav-link">Resumen</a>
  <a href="catalogo.html" class="nav-link active">Catálogo</a>
  <a href="historial.html" class="nav-link">Historial</a>
  <a href="cotizaciones.html" class="nav-link">Cotizaciones</a>
</nav>

  <div class="topbar-right">
    <div class="sync-pill">
      <span class="sync-icon">◔</span>
      <span id="ultima-sync">Última sync: --</span>
    </div>

    <button class="btn-primary btn-topbar">+ Nueva cotización</button>
  </div>
</header>

  <main class="container">
    <section class="card">
      <h1 class="page-title">Catálogo Vigente</h1>
      <p class="page-subtitle" id="catalogo-resumen">0 productos</p>
    </section>

    <section class="card filters-card">
      <div class="filtros-grid">
        <input
          type="text"
          id="buscar-catalogo"
          class="input-filtro"
          placeholder="Buscar por nombre de producto..."
        >

        <select id="filtro-categoria" class="input-filtro">
          <option value="">Todas las categorías</option>
        </select>

        <select id="filtro-proveedor" class="input-filtro">
          <option value="">Todos los proveedores</option>
        </select>
      </div>
    </section>

    <section class="card">
      <div id="tabla-catalogo-full"></div>
    </section>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/catalogo.js"></script>
</body>
</html>
