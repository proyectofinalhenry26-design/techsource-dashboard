<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva cotización | TechSource Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="bg-illustration"></div>

  <header class="topbar">
    <div class="logo">
      <img src="assets/logo.png" alt="TechSource Solutions" />
    </div>

    <nav class="nav">
      <a href="index.html" class="nav-link">Resumen</a>
      <a href="catalogo.html" class="nav-link">Catálogo</a>
      <a href="historial.html" class="nav-link">Historial</a>
      <a href="cotizaciones.html" class="nav-link">Cotizaciones</a>
    </nav>

    <div class="topbar-right">
      <div class="sync-pill">
        <span class="sync-icon">◔</span>
        <span id="ultima-sync">Última sync: --</span>
      </div>
      <a href="nueva-cotizacion.html" class="btn-primary btn-topbar">+ Nueva cotización</a>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1 class="page-title">Cotizador</h1>
      <p class="page-subtitle">Genera cotizaciones rápidas para tus clientes</p>
    </section>

    <section class="card" style="margin-top:14px;">
      <h2 class="section-title">Datos del cliente</h2>
      <div class="filtros-grid" style="grid-template-columns:1fr 1fr;">
        <div>
          <label class="label-form">Nombre del cliente</label>
          <input id="cliente-nombre" class="input-filtro" placeholder="Ej. Empresa ABC" />
        </div>
        <div>
          <label class="label-form">Email</label>
          <input id="cliente-email" class="input-filtro" placeholder="cliente@ejemplo.com" />
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:14px;">
      <h2 class="section-title">Agregar productos</h2>
      <div class="filtros-grid" style="grid-template-columns:1.7fr 1fr;">
        <input id="buscar-producto" class="input-filtro" placeholder="Buscar producto..." />
        <select id="select-producto" class="input-filtro">
          <option value="">Seleccionar producto</option>
        </select>
      </div>
    </section>

    <section class="card warning-card" id="alerta-precios" style="margin-top:14px; display:none;">
      <div id="alerta-precios-texto"></div>
    </section>

    <section class="card" style="margin-top:14px;" id="detalle-cotizacion-card">
      <h2 class="section-title">Detalle de cotización</h2>
      <div id="detalle-cotizacion"></div>

      <div class="cotizacion-actions">
        <button id="btn-generar-cotizacion" class="btn-primary btn-topbar">✈ Generar Cotización</button>
      </div>
    </section>

    <section class="card" id="resultado-cotizacion" style="margin-top:14px; display:none; text-align:center;">
      <div style="font-size:72px; line-height:1; color:#2da66b;">◌</div>
      <h2 style="margin-top:12px;">¡Cotización generada exitosamente!</h2>
      <p id="resultado-texto" class="page-subtitle"></p>
      <div id="resultado-warning" class="warning-card" style="max-width:420px; margin:18px auto 0; display:none;"></div>

      <div style="display:flex; justify-content:center; gap:12px; margin-top:22px; flex-wrap:wrap;">
        <button id="btn-descargar-pdf" class="btn-primary btn-topbar">⬇ Descargar PDF</button>
        <a href="nueva-cotizacion.html" class="btn-primary" style="background:#fff; color:#1d315d;">↻ Nueva Cotización</a>
      </div>
    </section>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/nueva-cotizacion.js"></script>
</body>
</html>
