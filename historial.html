<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial | TechSource Solutions</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>
  <div class="bg-illustration"></div>

  <header class="topbar">
    <div class="logo">
      <img src="assets/logo.png" alt="TechSource Solutions" />
    </div>

<nav class="nav">
  <a href="index.html" class="nav-link">Resumen</a>
  <a href="catalogo.html" class="nav-link">Catálogo</a>
  <a href="historial.html" class="nav-link active">Historial</a>
  <a href="cotizaciones.html" class="nav-link">Cotizaciones</a>
</nav>
    <div class="topbar-right">
      <span id="ultima-sync">Última sync: --</span>
      <button class="btn-primary">Nueva cotización</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1 class="page-title">Historial de Precios</h1>
      <p class="page-subtitle">Seguimiento de variaciones de precios por producto</p>
    </section>

    <section class="card filters-card">
      <div class="filtros-grid filtros-historial">
        <input
          type="text"
          id="buscar-historial"
          class="input-filtro"
          placeholder="Buscar por nombre de producto..."
        >

        <select id="filtro-categoria-historial" class="input-filtro">
          <option value="">Todas las categorías</option>
        </select>

        <select id="filtro-producto-historial" class="input-filtro">
          <option value="">Todos los productos</option>
        </select>
      </div>
    </section>

    <section class="card historial-chart-card">
      <h2 class="section-title">Evolución de Precios</h2>
      <div id="chart-historial"></div>
    </section>

    <section class="card historial-table-card">
      <h2 class="section-title" id="historial-count">Registro de Cambios</h2>
      <div id="tabla-historial-full"></div>
    </section>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/historial.js"></script>
</body>
</html>
